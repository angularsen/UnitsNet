name: CI Build

on:
  push:
    branches:
      - master
      - 'release/**'
      - 'maintenance/**'
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Never interrupt a master run while it may be publishing an immutable package set.
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 1
        lfs: true

    - name: Setup .NET SDKs
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Build, test and pack
      shell: pwsh
      run: ./Build/build.ps1

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        directory: Artifacts/Coverage
        fail_ci_if_error: true
        plugins: noop
        use_oidc: true

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: artifacts
        path: Artifacts/
        retention-days: 30

    - name: Upload NuGet packages
      uses: actions/upload-artifact@v7
      with:
        name: nuget-packages
        path: |
          Artifacts/**/*.nupkg
          Artifacts/**/*.snupkg
        if-no-files-found: error
        retention-days: 30

  publish-nuget:
    name: Publish NuGet packages
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/master' && github.repository_owner == 'angularsen'
    environment: Publish
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Download NuGet packages
      uses: actions/download-artifact@v8
      with:
        name: nuget-packages
        path: nugets

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: 10.0.x

    - name: Log in to NuGet with trusted publishing
      uses: NuGet/login@v1
      id: nuget-login
      with:
        user: angularsen

    - name: Push to nuget.org
      env:
        NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
      run: dotnet nuget push "**/*.nupkg" --skip-duplicate --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json
      working-directory: nugets
